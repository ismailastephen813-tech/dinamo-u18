<!DOCTYPE html>
<html>
<head>
    <title>Gallery - Dinamo U18</title>

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0b1d3a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #122a52;
            padding: 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: red;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Popup */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        #popup img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        /* Controls */
        .close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 30px;
            cursor: pointer;
        }

        .arrow {
            position: absolute;
            top: 50%;
            font-size: 40px;
            cursor: pointer;
            padding: 10px;
            user-select: none;
        }

        .left { left: 20px; }
        .right { right: 20px; }

        /* Mobile */
        @media (max-width: 600px) {
            .gallery img {
                height: 140px;
            }

            .arrow {
                font-size: 30px;
            }

            .close {
                font-size: 25px;
            }
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="players.html">Players</a>
    <a href="gallery.html">Gallery</a>
</nav>

<h1>Team Gallery</h1>

<div class="gallery">
    <img src="team1.jpg" onclick="showImage(0)">
    <img src="team2.jpg" onclick="showImage(1)">
    <img src="team3.jpg" onclick="showImage(2)">
    <img src="team4.jpg" onclick="showImage(3)">
    <img src="team5.jpg" onclick="showImage(4)">
    <img src="team6.jpg" onclick="showImage(5)">
    <img src="team7.jpg" onclick="showImage(6)">
    <img src="team8.jpg" onclick="showImage(7)">
    <img src="team9.jpg" onclick="showImage(8)">
    <img src="team10.jpg" onclick="showImage(9)">
</div>

<div id="popup">
    <span class="close" onclick="closeImage()">✖</span>
    <span class="arrow left" onclick="prevImage()">❮</span>

    <img id="popup-img">

    <span class="arrow right" onclick="nextImage()">❯</span>
</div>

<script>
let images = [
    "team1.jpg",
    "team2.jpg",
    "team3.jpg",
    "team4.jpg",
    "team5.jpg",
    "team6.jpg",
    "team7.jpg",
    "team8.jpg",
    "team9.jpg",
    "team10.jpg"
];

let currentIndex = 0;

function showImage(index) {
    currentIndex = index;
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = images[currentIndex];
}

function closeImage() {
    document.getElementById("popup").style.display = "none";
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("popup-img").src = images[currentIndex];
}

function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("popup-img").src = images[currentIndex];
}

/* Swipe support (mobile) */
let startX = 0;

document.getElementById("popup").addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.getElementById("popup").addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextImage();
    if (endX - startX > 50) prevImage();
});
</script>

</body>
</html>
