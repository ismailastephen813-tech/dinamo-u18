<!DOCTYPE html>
<html>
<head>
    <title>Gallery - Dinamo U18</title>

    <style>
        body {
            background: #0b1d3a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #122a52;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: red;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* POPUP */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        #popup img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav>

    <a href="index.html">Home</a>
    <a href="players.html">Players</a>
    <a href="gallery.html">Gallery</a>


   
</nav>

<h1>Team Gallery</h1>

<div class="gallery">
    <img src="team1.jpg" onclick="showImage(0)">
    <img src="team2.jpg" onclick="showImage(1)">
    <img src="team3.jpg" onclick="showImage(3)">
    <img src="team4.jpg" onclick="showImage(4)">
    <img src="team5.jpg" onclick="showImage(5)">
    <img src="team6.jpg" onclick="showImage(6)">
    <img src="team7.jpg" onclick="showImage(7)">
    <img src="team8.jpg" onclick="showImage(8)">
    <img src="team9.jpg" onclick="showImage(9)">
    <img src="team10.jpg" onclick="showImage(10)">
    <img src="team11.jpg" onclick="showImage(11)">
    <img src="team12.jpg" onclick="showImage(12)">
    <img src="team13.jpg" onclick="showImage(13)">
    <img src="team14.jpg" onclick="showImage(14)">
    <img src="team15.jpg" onclick="showImage(15)">
    <img src="team16.jpg" onclick="showImage(16)">
    <img src="team17.jpg" onclick="showImage(17)">
</div>

<div id="popup">
    <span class="close" onclick="closeImage()">✖</span>
    <span class="arrow left" onclick="prevImage()">❮</span>

    <img id="popup-img">

    <span class="arrow right" onclick="nextImage()">❯</span>
</div>

<script>
function showImage(src) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = src;
}

function closeImage() {
    document.getElementById("popup").style.display = "none";
}
</script>

<script>
function goBack() {
    window.history.back();
}
</script>

<script>
let images = [
    "team1.jpg",
    "team2.jpg",
    "team3.jpg",
    "team4.jpg",
    "team5.jpg",
    "team6.jpg",
    "team7.jpg",
    "team8.jpg",
    "team10.jpg",
    "team11.jpg",
    "team12.jpg",
    "team13.jpg",
    "team14.jpg",
    "team15.jpg",
    "team16.jpg",
    "team17.jpg"
    
];

let currentIndex = 0;

function showImage(index) {
    currentIndex = index;
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = images[currentIndex];
}

function closeImage() {
    document.getElementById("popup").style.display = "none";
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("popup-img").src = images[currentIndex];
}

function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("popup-img").src = images[currentIndex];
}
</script>

</body>
</html>
