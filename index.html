<!DOCTYPE html>
<html>
<head>
    <title>Dinamo U18</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0b1d3a;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #08142b;
        }

        header img {
            width: 120px;
        }

        nav {
            background: #122a52;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: red;
        }

        .hero {
            text-align: center;
            padding: 40px;
        }

        .btn {
            background: red;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        section {
            padding: 20px;
        }
        .news {
    padding: 20px;
}

.news-container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.news-card {
    background: #122a52;
    border-radius: 10px;
    overflow: hidden;
    width: 300px;
    transition: transform 0.3s, box-shadow 0.3s;
}

.news-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.news-card h3 {
    margin: 10px;
}

.news-card p {
    margin: 10px;
    font-size: 0.9rem;
}

/* Hover animation */
.news-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}
        
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="Dinamo Logo">
    <h1>Dinamo U18</h1>
    <p>London Dinamo Football Club</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="players.html">Players</a>
    <a href="matches.html">Matches</a>
    <a href="gallery.html">Gallery</a>
</nav>

<div class="hero">
    <h2>Welcome to Dinamo U18</h2>
    <p>Passion. Discipline. Football.</p>
    <a href="#" class="btn">View Matches</a>
</div>

<section>
    <h2>Latest News</h2>
    <p>We won our last match 3-1. Great performance from the squad.</p>
</section>

</body>
</html>
