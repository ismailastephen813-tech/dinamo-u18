<!DOCTYPE html>
<html>
<head>
    <title>Dinamo U18</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0b1d3a;
            color: white;
        }

        header {
            text-align: center;
            padding: 15px;
            background: #08142b;
        }

        header img {
            width: 80px;
        }

        nav {
            background: #122a52;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: red;
        }

        .main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #122a52;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .match {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team img {
            width: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 6px;
            border-bottom: 1px solid #1f3b6d;
        }

        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }
        }

        /* POPUP */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: flex-end;
        }

        #popup-content {
            background: #122a52;
            width: 100%;
            max-width: 700px;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 85%;
            overflow-y: auto;
        }

        .table-wrapper {
            overflow-x: auto;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png">
    <h1>Dinamo U18</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="players.html">Players</a>
    <a href="gallary.html">Gallery</a>
    <a href="gallary.html">Match</a>
</nav>

<div class="main">

    <!-- LEFT -->
    <div>

        <div class="card" onclick="showNextMatch()">
            <h3>Next Match</h3>
            <div class="match">
                <div class="team">
                    <img src="logo.png">
                    <p>Dinamo</p>
                </div>
                <div>
                    <h2>18:30</h2>
                    <p>May 13</p>
                </div>
                <div class="team">
                    <img src="PCL.png">
                    <p>PCL Red</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Latest News</h3>
            <p>Dinamo U18 won the EMDSL 2025 Indoor District Cup.</p>
        </div>

        <div class="card" onclick="showTable()">
            <h3>League Table</h3>
            <table id="leagueTable">
                <tr>
                    <td>#</td>
                    <td>Team</td>
                    <td>PL</td>
                </tr>
            </table>
        </div>

    </div>

    <!-- RIGHT -->
    <div>

        <div class="card" onclick="showScorers()">
            <h3>Top Scorer</h3>
            <p>Click to view top 16</p>
        </div>

        <div class="card" onclick="showAssists()">
            <h3>Assists</h3>
            <p>Click to view top 16</p>
        </div>

    </div>

</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
    <div id="popup-content" onclick="event.stopPropagation()"></div>
</div>

<script>
// LINKS
const scorersURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTYItIowssHqL3ffEQrMk5Ahiodqd-qhx_iNvCYO3yhwYhL9lzuaNx0zZdNyWOVJa5KX7RZdWT_VPj/pub?output=csv";
const assistsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZPjH0a6C4_GeOxwsrwX8yE1Z1DqXtCXGoqSYMDfbKncVzTfpkE20N_TAkZ9KtnABTLMbstIdqroIH/pub?output=csv";
const tableURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTFeoqVHunR8pNuVcI6wASqFZNm89fugM-u47HKmJomKz6Ey7KKV12CI9gZch70yVu9NMgI3LeLXHEk/pub?output=csv";

// POPUP
function openPopup(content) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-content").innerHTML = content;
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// NEXT MATCH (STATIC FOR NOW)
function showNextMatch() {
    openPopup(`
        <h2>Next Match</h2>
        <p><b>Dinamo vs PCL Red</b></p>
        <p>Date: May 13</p>
        <p>Time: 18:30</p>
        <p>Stadium: London Sports Dome</p>
        <p>Weather: 18°C Cloudy</p>
    `);
}

// TABLE
function showTable() {
    let rows = document.querySelectorAll("#leagueTable tr");
    let content = "<h2>League Table</h2><div class='table-wrapper'><table>";

    rows.forEach(r => {
        content += "<tr>" + r.innerHTML + "</tr>";
    });

    content += "</table></div>";
    openPopup(content);
}

// SCORERS
function showScorers() {
    fetch(scorersURL)
    .then(res => res.text())
    .then(data => {
        let rows = data.trim().split("\n").slice(1);

        let players = rows.map(r => {
            let c = r.split(",");
            return { name: c[0], goals: parseInt(c[1]) || 0 };
        });

        players.sort((a,b) => b.goals - a.goals);

        let content = "<h2>Top Scorers</h2>";

        players.slice(0,16).forEach((p,i) => {
            content += `<p>${i+1}. ${p.name} - ${p.goals} goals</p>`;
        });

        openPopup(content);
    });
}

// ASSISTS
function showAssists() {
    fetch(assistsURL)
    .then(res => res.text())
    .then(data => {
        let rows = data.trim().split("\n").slice(1);

        let players = rows.map(r => {
            let c = r.split(",");
            return { name: c[0], assists: parseInt(c[1]) || 0 };
        });

        players.sort((a,b) => b.assists - a.assists);

        let content = "<h2>Top Assists</h2>";

        players.slice(0,16).forEach((p,i) => {
            content += `<p>${i+1}. ${p.name} - ${p.assists} assists</p>`;
        });

        openPopup(content);
    });
}

// LOAD TABLE
fetch(tableURL)
.then(res => res.text())
.then(data => {
    const rows = data.trim().split("\n").slice(1);
    const table = document.getElementById("leagueTable");

    rows.forEach(row => {
        const cols = row.split(",");
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${cols[0]}</td>
            <td>${cols[1]}</td>
            <td>${cols[2]}</td>
        `;

        table.appendChild(tr);
    });
});
</script>

</body>
</html>
