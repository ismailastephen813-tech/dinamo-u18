<!DOCTYPE html>
<html>
<head>
<title>Matches - Dinamo U18</title>

<style>
body {
    background: #0b1d3a;
    color: white;
    font-family: Arial;
}

h1 {
    text-align: center;
    padding: 20px;
}

#matches {
    padding: 20px;
}

.match {
    background: #122a52;
    margin: 12px auto;
    width: 85%;
    border-radius: 12px;
    padding: 15px;
    transition: 0.3s;
}

.match:hover {
    transform: scale(1.02);
}

.teams {
    font-size: 18px;
    font-weight: bold;
}

.info {
    margin-top: 5px;
    font-size: 14px;
    opacity: 0.9;
}

.upcoming { color: #00ccff; }
.win { color: lightgreen; }
.loss { color: red; }
</style>
</head>

<body>

<h1>2026 Match Schedule</h1>

<div id="matches"></div>


    <script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQhsBG9SJfocJHRjr-6o0ocUIXLCe-JfUorOyppKhsI1YlxqoUEZwu4750OyDp6QjaO7KI1ffhv91xP/pub?output=csv")
.then(res => res.text())
.then(data => {

    let rows = data.split("\n").slice(1);
    let container = document.getElementById("matches");

    rows.forEach(row => {
        let cols = row.split(",");

        let match = document.createElement("div");
        match.className = "match";

        match.innerHTML = `
            <div class="teams">${cols[0]}</div>
            <div class="info">📅 ${cols[1]} | ⏰ ${cols[2]}</div>
            <div class="info">📍 ${cols[3]}</div>
            <div class="info ${cols[4]}">${cols[4]}</div>
        `;

        container.appendChild(match);
    });
});
</script>

</body>
</html>
