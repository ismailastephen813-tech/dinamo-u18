<h1>Our Players</h1>

<div id="players"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvpkXU7-63UCW1jIiSryVxfXUPpFUHqkKgvkk2e30JVJzaWrzve2zFWDBZXuokG9SA_YCUzusUvbhU/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("players");

    rows.forEach(row => {
        const cols = row.split(",");

        const player = {
            name: cols[0],
            position: cols[1],
            age: cols[2],
            foot: cols[3],
            country: cols[4],
            height: cols[5],
            number: cols[6],
            goals: cols[7],
            assists: cols[8],
            instagram: cols[9],
            image: cols[10]
        };

        container.innerHTML += `
        <div class="player" onclick="toggle(this)">
            <div class="player-header">
                <img src="${player.image}">
                <h3>${player.name}</h3>
            </div>

            <div class="player-info">
                <p><b>Position:</b> ${player.position}</p>
                <p><b>Age:</b> ${player.age}</p>
                <p><b>Foot:</b> ${player.foot}</p>
                <p><b>Country:</b> ${player.country}</p>
                <p><b>Height:</b> ${player.height}</p>
                <p><b>Number:</b> ${player.number}</p>
                <p><b>Stats:</b> ${player.goals} Goals | ${player.assists} Assists</p>

                <p>
                    <b>Instagram:</b> 
                    <a href="${player.instagram}" target="_blank">Open</a>
                </p>
            </div>
        </div>
        `;
    });
});

function toggle(el) {
    let info = el.querySelector(".player-info");
    info.style.display = info.style.display === "block" ? "none" : "block";
}
</script>
