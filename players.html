<!DOCTYPE html>
<html>
<head>
    <title>Dinamo U18 - Players</title>

    <style>
        body {
            background: #0b1d3a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        /* PLAYER CARD */
        .player {
            background: #122a52;
            margin: 12px auto;
            width: 92%;
            max-width: 650px;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .player:hover {
            background: #163a6b;
        }

        /* HEADER */
        .player-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* INFO SECTION */
        .player-info {
            display: none;
            margin-top: 12px;
        }

        /* FIX BIG IMAGES */
        .player-info img {
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }

        .player-info a {
            color: #ff4d4d;
            text-decoration: none;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .player {
                width: 95%;
                padding: 12px;
            }

            .player-header img {
                width: 50px;
                height: 50px;
            }
        }
      header {
    text-align: center;
    padding: 15px;
    background: #08142b;
}

nav {
    background: #122a52;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 10px;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: red;
}
</style>
</head>
<nav>
    <a href="index.html">Home</a>
    <a href="players.html">Players</a>
    <a href="matches.html">Matches</a>
    <a href="gallery.html">Gallery</a>
    <a href="news.html">News</a>
</nav>

<body>

<h1>Our Players</h1>

<div id="players"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvpkXU7-63UCW1jIiSryVxfXUPpFUHqkKgvkk2e30JVJzaWrzve2zFWDBZXuokG9SA_YCUzusUvbhU/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("players");

    rows.forEach(row => {
        const cols = row.split(",");

        const player = {
            name: cols[0],
            position: cols[1],
            age: cols[2],
            foot: cols[3],
            country: cols[4],
            height: cols[5],
            number: cols[6],
            goals: cols[7],
            assists: cols[8],
            instagram: cols[9],
            image: cols[10]
        };

        container.innerHTML += `
        <div class="player" onclick="toggle(this)">
            <div class="player-header">
                <img src="${player.image}">
                <h3>${player.name}</h3>
            </div>

            <div class="player-info">
                <p><b>Position:</b> ${player.position}</p>
                <p><b>Age:</b> ${player.age}</p>
                <p><b>Foot:</b> ${player.foot}</p>
                <p><b>Country:</b> ${player.country}</p>
                <p><b>Height:</b> ${player.height}</p>
                <p><b>Number:</b> ${player.number}</p>
                <p><b>Stats:</b> ${player.goals} Goals | ${player.assists} Assists</p>

                <p>
                    <b>Instagram:</b>
                    <a href="${player.instagram}" target="_blank">Open</a>
                </p>
            </div>
        </div>
        `;
    });
});

function toggle(el) {
    let info = el.querySelector(".player-info");
    info.style.display = info.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
